name: smart_warehouse

packages:
  - '*'
  - packages/**

command:
  bootstrap:
    runPubGetInParallel: false

scripts:
  pub_upgrade:
    exec: flutter pub upgrade
  get:
    exec: flutter pub get
  generate:
    exec: dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      dependsOn: build_runner
  test:
    exec: |
      if [ -d "test" ]; then
        flutter test --no-pub
      fi
